<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Subscription Control Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --bg:#3D5FEF;
  --bg-soft:#0C0C0E;
  --surface:#161618;
  --surface-2:#1F1F22;
  --surface-hover:#28282C;
  --border:#2D2D32;
  --border-soft:#202024;
  --text:#F2F2F4;
  --text-dim:#A2A2AC;
  --text-faint:#6B6B74;

  --accent:#3D5FEF;
  --accent-dim:rgba(61,95,239,.18);
  --accent-2:#6E8DF7;

  --lime:#8FD16A;
  --lime-dim:rgba(143,209,106,.16);
  --lime-text:#16240D;
  --violet:#B79AEA;
  --violet-dim:rgba(183,154,234,.16);
  --red:#E2685C;
  --red-dim:rgba(226,104,92,.16);
  --orange:#E89A5C;
  --orange-dim:rgba(232,154,92,.16);
  --yellow:#E8C158;
  --yellow-dim:rgba(232,193,88,.16);
  --blue:#6E93F5;
  --blue-dim:rgba(110,147,245,.16);
  --brown:#C08552;
  --brown-dim:rgba(192,133,82,.16);
  --gray-badge:#9C8C84;
  --gray-dim:rgba(156,140,132,.16);

  --radius-lg:24px;
  --radius:16px;
  --radius-sm:10px;
  --shadow-card:0 10px 26px -8px rgba(0,0,0,.4);
  --shadow-pop:0 24px 60px -12px rgba(0,0,0,.5);

  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg-soft);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  padding:0;
  min-height:100vh;
}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;letter-spacing:-.01em;}
p{margin:0;}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
::selection{background:var(--accent);color:#fff;}
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--surface-hover);}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* ============================================================
   APP SHELL — single floating card on a blue page frame
   ============================================================ */
.app-shell{
  background:var(--bg-soft);
  border-radius:0;
  max-width:none;
  margin:0;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ---------- Navbar (top, horizontal) ---------- */
.navbar{
  display:flex;
  align-items:center;
  gap:18px;
  padding:16px 26px;
  border-bottom:1px solid var(--border-soft);
  position:relative;
  flex-wrap:nowrap;
}
.navbar-brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand-mark{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  position:relative;flex-shrink:0;
}
.pulse-dot{
  position:absolute;top:-3px;right:-3px;
  width:9px;height:9px;border-radius:50%;
  background:var(--accent-2);
  box-shadow:0 0 0 0 rgba(110,147,245,.6);
  animation:pulse 2.2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(110,147,245,.55);}
  70%{box-shadow:0 0 0 7px rgba(110,147,245,0);}
  100%{box-shadow:0 0 0 0 rgba(110,147,245,0);}
}
.brand-text{display:flex;flex-direction:column;line-height:1.15;}
.brand-text strong{font-family:var(--font-display);font-size:14.5px;font-weight:700;white-space:nowrap;}
.brand-text span{font-size:10.5px;color:var(--text-faint);letter-spacing:.04em;text-transform:uppercase;}

.nav{display:flex;align-items:center;gap:3px;flex:1;min-width:0;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 16px;border-radius:999px;
  color:var(--text-dim);font-size:13px;font-weight:500;
  background:none;border:none;text-align:left;white-space:nowrap;flex-shrink:0;
  transition:background .15s,color .15s;
}
.nav-item svg{width:15px;height:15px;flex-shrink:0;display:none;}
.nav-item:hover{background:var(--surface-2);color:var(--text);}
.nav-item.active{background:var(--text);color:#16161A;font-weight:700;}
.nav-section-label{
  font-size:10.5px;color:var(--text-faint);text-transform:uppercase;
  letter-spacing:.07em;margin:16px 11px 6px;font-weight:600;
}
.nav-badge{
  margin-left:2px;background:var(--red);color:#fff;font-size:9.5px;
  font-weight:700;border-radius:20px;padding:1px 6px;min-width:15px;text-align:center;display:inline-flex;align-items:center;justify-content:center;
}

.navbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.role-pill{
  background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);
  border-radius:999px;padding:8px 14px;font-size:12px;font-weight:500;
}
.user-chip{display:flex;align-items:center;gap:8px;}
.avatar{
  width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--violet));
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
  border:2px solid var(--border-soft);
}
.user-chip-text{display:none;}

/* ---------- Search ---------- */
.search-wrap{position:relative;width:220px;flex-shrink:0;}
.search-input{
  width:100%;background:var(--surface-2);border:1px solid var(--border);
  border-radius:999px;padding:9px 14px 9px 36px;color:var(--text);font-size:12.5px;
}
.search-input::placeholder{color:var(--text-faint);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-faint);width:15px;height:15px;}
.search-results{
  position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface-2);
  border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-pop);
  max-height:320px;overflow-y:auto;z-index:50;display:none;min-width:280px;
}
.search-results.show{display:block;}
.search-result-item{
  padding:10px 14px;display:flex;flex-direction:column;gap:2px;cursor:pointer;border-bottom:1px solid var(--border-soft);
}
.search-result-item:last-child{border-bottom:none;}
.search-result-item:hover{background:var(--surface-hover);}
.search-result-item strong{font-size:13px;}
.search-result-item span{font-size:11px;color:var(--text-faint);}

.topbar-spacer{flex:1;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;background:var(--surface-2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);position:relative;flex-shrink:0;transition:background .15s,color .15s;
}
.icon-btn:hover{background:var(--surface-hover);color:var(--text);}
.icon-btn svg{width:16px;height:16px;}
.icon-btn .dot{
  position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);
  display:none;border:1.5px solid var(--surface);
}
.icon-btn .dot.show{display:block;}

.view-container{padding:28px 30px 60px;flex:1;min-width:0;}
.view{display:none;}
.view.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.view-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap;}
.view-header h1{font-size:26px;font-weight:700;}
.view-header p{color:var(--text-dim);font-size:13px;margin-top:5px;}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 18px;border-radius:999px;border:1px solid transparent;
  font-size:13px;font-weight:600;transition:transform .12s,opacity .12s,background .15s;
}
.btn svg{width:15px;height:15px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-secondary{background:var(--surface-2);color:var(--text);border-color:var(--border);}
.btn-secondary:hover{background:var(--surface-hover);}
.btn-ghost{background:transparent;color:var(--text-dim);}
.btn-ghost:hover{background:var(--surface-2);color:var(--text);}
.btn-danger{background:var(--red-dim);color:var(--red);}
.btn-danger:hover{opacity:.85;}
.btn-violet{background:var(--violet-dim);color:var(--violet);}
.btn-sm{padding:7px 13px;font-size:12px;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.icon-only{padding:8px;border-radius:50%;}

/* ============================================================
   CARDS / KPIs
   ============================================================ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi-card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-lg);
  padding:20px;box-shadow:var(--shadow-card);position:relative;overflow:hidden;
  transition:border-color .2s;
}
.kpi-card:hover{border-color:var(--border);}
.kpi-card.featured{background:linear-gradient(160deg,var(--accent-dim),transparent 70%);border-color:rgba(61,95,239,.3);}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.kpi-label{font-size:11.5px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.kpi-icon{width:32px;height:32px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-dim);}
.kpi-icon svg{width:15px;height:15px;}
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:700;}
.kpi-delta{font-size:11.5px;margin-top:7px;color:var(--text-faint);}
.kpi-delta.up{color:var(--lime);}
.kpi-delta.down{color:var(--red);}

.panel{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-lg);
  padding:22px;box-shadow:var(--shadow-card);
}
.panel-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.panel-title h3{font-size:15px;font-weight:700;}
.panel-title .muted{font-size:12px;color:var(--text-faint);}

.dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start;}
.chart-wrap{position:relative;height:260px;width:100%;}
.chart-wrap canvas{display:block;}
.chart-wrap-sm{position:relative;height:220px;width:100%;}
.chart-wrap-sm canvas{display:block;}

/* ============================================================
   BADGES / STATUS
   ============================================================ */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap;
}
.badge .bdot{width:6px;height:6px;border-radius:50%;}
.badge-activo{background:var(--lime-dim);color:var(--lime);}
.badge-activo .bdot{background:var(--lime);box-shadow:0 0 0 0 rgba(143,209,106,.6);animation:pulse 2.2s infinite;}
.badge-proximo{background:var(--yellow-dim);color:var(--yellow);}
.badge-pendiente{background:var(--orange-dim);color:var(--orange);}
.badge-vencido{background:var(--red-dim);color:var(--red);}
.badge-suspendido{background:var(--gray-dim);color:var(--gray-badge);}
.badge-archivado{background:var(--blue-dim);color:var(--blue);}
.badge-solicitud{background:var(--violet-dim);color:var(--violet);}
.badge-revision{background:var(--brown-dim);color:var(--brown);}
.badge-area{background:var(--surface-2);color:var(--text-dim);}

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-faint);font-weight:600;padding:0 12px 10px;border-bottom:1px solid var(--border-soft);
  white-space:nowrap;
}
tbody td{padding:13px 12px;border-bottom:1px solid var(--border-soft);vertical-align:middle;}
tbody tr{transition:background .12s;}
tbody tr:hover{background:var(--surface-2);}
.cell-name{display:flex;flex-direction:column;cursor:pointer;}
.cell-name strong{font-size:13px;}
.cell-name span{font-size:11px;color:var(--text-faint);}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}
.mono{font-family:var(--font-mono);font-size:12.5px;}
.text-dim{color:var(--text-dim);}
.text-faint{color:var(--text-faint);}
.empty-state{
  text-align:center;padding:50px 20px;color:var(--text-faint);
}
.empty-state svg{width:34px;height:34px;margin-bottom:10px;opacity:.5;}
.empty-state strong{display:block;color:var(--text-dim);font-size:14px;margin-bottom:4px;}

/* ============================================================
   FILTER BAR
   ============================================================ */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.filter-bar select,.filter-bar input[type=text],.filter-bar input[type=date]{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  border-radius:999px;padding:8px 14px;font-size:12.5px;
}
.filter-bar select{min-width:130px;}

/* ============================================================
   MODALS
   ============================================================ */
.overlay{
  position:fixed;inset:0;background:rgba(20,14,12,.65);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.overlay.show{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  max-width:680px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-pop);
  animation:modalin .18s ease;
}
.modal.modal-lg{max-width:920px;}
@keyframes modalin{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;padding:20px 24px;
  border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--surface);z-index:5;
}
.modal-head h3{font-size:17px;}
.modal-body{padding:24px;}
.modal-foot{
  display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border-soft);
  position:sticky;bottom:0;background:var(--surface);
}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:12px;color:var(--text-dim);font-weight:500;}
.form-field input,.form-field select,.form-field textarea{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;width:100%;
}
.form-field textarea{resize:vertical;min-height:64px;}
.form-section-title{
  grid-column:1/-1;font-size:11px;text-transform:uppercase;letter-spacing:.06em;
  color:var(--accent-2);font-weight:700;margin:14px 0 2px;
}
.checkbox-row{display:flex;flex-wrap:wrap;gap:10px;}
.chip-check{
  display:flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:999px;padding:7px 13px;font-size:12px;cursor:pointer;user-select:none;
}
.chip-check input{accent-color:var(--accent);}
.chip-check.checked{border-color:var(--accent);color:var(--accent-2);background:var(--accent-dim);}

/* tabs inside modal */
.tabbar{display:flex;gap:4px;border-bottom:1px solid var(--border-soft);margin-bottom:16px;}
.tabbar button{
  background:none;border:none;color:var(--text-dim);padding:9px 13px;font-size:12.5px;font-weight:600;
  border-bottom:2px solid transparent;
}
.tabbar button.active{color:var(--accent-2);border-color:var(--accent);}
.tabpane{display:none;}
.tabpane.active{display:block;}

/* ============================================================
   KANBAN (FINANZAS)
   ============================================================ */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:240px;gap:12px;overflow-x:auto;padding-bottom:10px;}
.kanban-col{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:var(--radius);padding:10px;min-height:120px;}
.kanban-col-head{display:flex;justify-content:space-between;align-items:center;padding:4px 6px 10px;}
.kanban-col-head strong{font-size:12px;}
.kanban-count{background:var(--surface-2);font-size:10.5px;padding:1px 8px;border-radius:999px;color:var(--text-dim);}
.kcard{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:12px;margin-bottom:8px;
  cursor:grab;
}
.kcard:active{cursor:grabbing;}
.kcard strong{font-size:12.5px;display:block;}
.kcard .kmeta{font-size:11px;color:var(--text-faint);margin-top:4px;}
.kcard select{width:100%;margin-top:8px;font-size:11px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:5px 10px;}
.kanban-col.dragover{outline:2px dashed var(--accent);outline-offset:2px;}

/* ============================================================
   DOCS
   ============================================================ */
.docs-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px;}
.view-toggle button{background:none;border:none;color:var(--text-dim);padding:6px 13px;border-radius:999px;font-size:12px;}
.view-toggle button.active{background:var(--surface-2);color:var(--text);}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.doc-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:16px;padding:15px;}
.doc-card .doc-icon{width:36px;height:36px;border-radius:50%;background:var(--violet-dim);color:var(--violet);display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.doc-card .doc-icon svg{width:17px;height:17px;}
.doc-card strong{font-size:12.5px;display:block;margin-bottom:3px;word-break:break-word;}
.doc-card span{font-size:11px;color:var(--text-faint);}
.timeline{border-left:2px solid var(--border);margin-left:8px;padding-left:20px;}
.timeline-item{position:relative;padding-bottom:18px;}
.timeline-item::before{content:'';position:absolute;left:-26px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--accent);}
.timeline-item strong{font-size:13px;}
.timeline-item div.meta{font-size:11.5px;color:var(--text-faint);margin-top:2px;}

/* ============================================================
   NOTIFICATIONS / TOASTS
   ============================================================ */
.notif-panel{
  position:absolute;top:60px;right:26px;width:340px;max-height:420px;overflow-y:auto;
  background:var(--surface-2);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-pop);
  z-index:60;display:none;
}
.notif-panel.show{display:block;}
.notif-item{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border-soft);}
.notif-item:last-child{border-bottom:none;}
.notif-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.notif-item strong{font-size:12.5px;display:block;}
.notif-item span{font-size:11px;color:var(--text-faint);}
.notif-empty{padding:30px 16px;text-align:center;color:var(--text-faint);font-size:12.5px;}

.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200;}
.toast{
  background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:14px;padding:12px 16px;font-size:13px;box-shadow:var(--shadow-pop);min-width:240px;
  animation:toastin .2s ease;
}
.toast.error{border-left-color:var(--red);}
@keyframes toastin{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* ============================================================
   AUDIT
   ============================================================ */
.audit-action{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--surface-2);color:var(--text-dim);}

/* ============================================================
   REPORT PREVIEW (printable)
   ============================================================ */
.report-page{
  background:#fff;color:#111;border-radius:14px;padding:34px;font-family:var(--font-body);
}
.report-page h1,.report-page h2,.report-page h3{font-family:var(--font-display);color:#111;}
.report-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #3D5FEF;padding-bottom:14px;margin-bottom:18px;}

/* ================================================================
   UTILITIES
================================================================ */
const uid = (p='id') => p + '_' + Math.random().toString(36).slice(2,9);
const todayISO = () => new Date().toISOString().slice(0,10);
function addDays(dateStr, n){ const d = new Date(dateStr); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function fmtDate(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('es-CO', {day:'2-digit', month:'short', year:'numeric'});
}
function fmtMoney(n, currency='USD'){
  if(n===null||n===undefined||isNaN(n)) return '—';
  const symbols = {USD:'$', EUR:'€', COP:'COP$', MXN:'MX$', GBP:'£'};
  return (symbols[currency]||currency+' ') + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function daysLeft(dateStr){
  const d1 = new Date(new Date().toDateString());
  const d2 = new Date(new Date(dateStr).toDateString());
  return Math.round((d2-d1)/86400000);
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ return (name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

================================================================ */
const DEFAULT_CATEGORIES = ['Marketing','Diseño','Automatización','IA','CRM','Analítica','SEO','Publicidad','Productividad','Comunicación','Ventas'];

let STATE = null;

let saveTimer = null;

function defaultState(){
  return {
    platforms: [],
    categories: DEFAULT_CATEGORIES.map(name => ({id: uid('cat'), name})),
    users: [
      {id: uid('usr'), name:'Administrador', email:'', role:'super_admin', status:'Activo'},
    ],
    auditLog: [],
    settings: { role:'super_admin', currentUser:'Administrador', emailjs: {serviceId:'', templateId:'', publicKey:''} },
  };
}

/* ---------- Persistence ---------- */
async function loadState(){
  try{
    const res = await window.storage.get('scc-state', false);
    if(res && res.value){
      STATE = JSON.parse(res.value);
      if(!STATE.users) STATE.users = defaultState().users;
      if(!STATE.settings) STATE.settings = {role:'super_admin', currentUser:'Administrador'};
      if(!STATE.settings.emailjs) STATE.settings.emailjs = {serviceId:'', templateId:'', publicKey:''};
      (STATE.platforms||[]).forEach(p=>{
        if(!p.alertConfig) p.alertConfig = {thresholds:[30,15,7,3,1], channels:{email:true,whatsapp:false,inapp:true,push:false}, emails:[], whatsappNumbers:[]};
        if(p.alertConfig.autoSendEnabled===undefined) p.alertConfig.autoSendEnabled = false; // off by default for platforms created before this feature, to avoid an unexpected mass-send on past-due dates
        if(!p.alertConfig.scheduledType) p.alertConfig.scheduledType = 'alerta';
        if(!p.alertConfig.scheduledDate) p.alertConfig.scheduledDate = addDays(p.acquiredDate||todayISO(), 30);
        if(!p.alertConfig.scheduledTime) p.alertConfig.scheduledTime = '09:00';
        if(!p.alertConfig.intervalDays) p.alertConfig.intervalDays = 30;
        if(p.alertConfig.autoSendCompleted===undefined) p.alertConfig.autoSendCompleted = false;
        if(p.alertConfig.lastAutoSendResult===undefined) p.alertConfig.lastAutoSendResult = null;
        (p.documents||[]).forEach(d=>{ if(d.hasContent===undefined) d.hasContent = false; });
      });
      return;
    }
  }catch(e){ /* no stored value yet, or storage unavailable */ }
  STATE = defaultState();
  persist();
}
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try{ await window.storage.set('scc-state', JSON.stringify(STATE), false); }
    catch(e){ console.warn('No se pudo guardar el estado (almacenamiento no disponible).', e); }
  }, 250);
}

/* ---------- Real email sending (EmailJS) ----------
   EmailJS uses a public key designed to live in client-side code (unlike
   a normal SMTP/API secret), so this is the one channel that can send
   REAL email with no backend. Configure it in Configuración > Correo.
   Template in EmailJS must expose: {{to_email}}, {{subject}}, {{message}}. */
function emailjsReady(){
  const c = STATE.settings.emailjs;
  return !!(c && c.serviceId && c.templateId && c.publicKey);
}
async function sendRealEmail(toEmail, subject, message){
  if(!emailjsReady()){
    toast('Configura EmailJS en Configuración > Correo antes de enviar', 'error');
    return {ok:false, reason:'not_configured'};
  }
  const c = STATE.settings.emailjs;
  try{
    const res = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        service_id: c.serviceId,
        template_id: c.templateId,
        user_id: c.publicKey,
        template_params: { to_email: toEmail, subject, message }
      })
    });
    if(res.ok) return {ok:true};
    const text = await res.text();
    return {ok:false, reason: text || ('HTTP '+res.status)};
  }catch(e){
    return {ok:false, reason: e.message || 'Error de red'};
  }
}

/* ---------- Audit ---------- */
function log(entity, action, details, ip){
  STATE.auditLog.unshift({
    id: uid('log'), timestamp: new Date().toISOString(),
    user: STATE.settings.currentUser, action, entity, details: details||'', ip: ip||'Local'
  });
  if(STATE.auditLog.length>500) STATE.auditLog.length = 500;
}

/* ---------- Status engine ---------- */
const STATUS_META = {
  activo:{label:'Activo', cls:'badge-activo'},
  proximo:{label:'Próximo a renovar', cls:'badge-proximo'},
  pendiente:{label:'Renovación pendiente', cls:'badge-pendiente'},
  vencido:{label:'Vencido', cls:'badge-vencido'},
  suspendido:{label:'Suspendido', cls:'badge-suspendido'},
  archivado:{label:'Archivado', cls:'badge-archivado'},
  solicitud:{label:'Solicitud enviada', cls:'badge-solicitud'},
  revision:{label:'En revisión', cls:'badge-revision'},
};
function computeStatus(p){
  if(p.archived) return 'archivado';
  if(p.suspended) return 'suspendido';
  if(p.financeStatus === 'Solicitado') return 'solicitud';
  if(p.financeStatus === 'En revisión') return 'revision';
  if(p.financeStatus === 'Aprobado') return 'pendiente';
  const d = daysLeft(p.expiryDate);
  if(d < 0) return 'vencido';
  if(d <= 30) return 'proximo';
  return 'activo';
}
function badgeHtml(statusKey){
  const m = STATUS_META[statusKey];
  return `<span class="badge ${m.cls}"><span class="bdot"></span>${m.label}</span>`;
}
function categoryName(id){ return STATE.categories.find(c=>c.id===id)?.name || '—'; }

/* ================================================================
   PERMISSIONS (RBAC)
================================================================ */
function can(action){
  const perms = {
    super_admin:{edit:true, delete:true, approve:true, manageUsers:true, manageCategories:true},
    admin:{edit:true, delete:true, approve:true, manageUsers:false, manageCategories:true},
    viewer:{edit:false, delete:false, approve:false, manageUsers:false, manageCategories:false},
  };
  return !!(perms[STATE.settings.role] && perms[STATE.settings.role][action]);
}
function roleLabel(r){ return {super_admin:'Super Admin', admin:'Admin', viewer:'Visualizador'}[r] || r; }

/* ================================================================
   TOASTS
================================================================ */
function toast(msg, type='success'){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast' + (type==='error' ? ' error' : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3200);
}

function updateUserChip(){
  const av = document.getElementById('userAvatar');
  av.textContent = initials(STATE.settings.currentUser);
  av.title = `${STATE.settings.currentUser} — ${roleLabel(STATE.settings.role)}`;
}

function switchView(viewId){
  STATE.ui = STATE.ui || {};
  STATE.ui.activeView = viewId;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+viewId).classList.add('active');
  document.querySelectorAll('.nav-item, .bottom-nav button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===viewId);
  });
  renderCurrentView();
  document.getElementById('viewContainer').scrollTop = 0;
  window.scrollTo(0,0);
}
function renderCurrentView(){
  const id = (STATE.ui && STATE.ui.activeView) || 'dashboard';
  const renderers = {
    dashboard: renderDashboard, platforms: renderPlatforms, finance: renderFinance,
    documents: renderDocuments, alerts: renderAlerts, reports: renderReports,
    audit: renderAudit, settings: renderSettings,
  };
  renderers[id] && renderers[id]();
  updateNotifBadge();
}

/* ================================================================
   GLOBAL SEARCH
================================================================ */
function handleGlobalSearch(e){
  const q = e.target.value.trim().toLowerCase();
  const box = document.getElementById('searchResults');
  if(!q){ box.classList.remove('show'); box.innerHTML=''; return; }
  const results = STATE.platforms.filter(p =>
    p.name.toLowerCase().includes(q) || (p.provider||'').toLowerCase().includes(q) ||
    (p.owner||'').toLowerCase().includes(q) || categoryName(p.category).toLowerCase().includes(q) ||
    (p.plan||'').toLowerCase().includes(q)
  ).slice(0,8);
  if(!results.length){
    box.innerHTML = `<div class="search-result-item"><span>Sin resultados para "${escapeHtml(q)}"</span></div>`;
  } else {
    box.innerHTML = results.map(p => `
      <div class="search-result-item" data-id="${p.id}">
        <strong>${escapeHtml(p.name)}</strong>
        <span>${categoryName(p.category)} · ${escapeHtml(p.owner||'')} · ${STATUS_META[computeStatus(p)].label}</span>
      </div>`).join('');
    box.querySelectorAll('.search-result-item').forEach(item=>{
      item.addEventListener('click', ()=>{
        box.classList.remove('show');
        document.getElementById('globalSearch').value='';
        switchView('platforms');
        setTimeout(()=>openPlatformDetail(item.dataset.id), 60);
      });
    });
  }
  box.classList.add('show');
}

/* ================================================================
   NOTIFICATIONS (computed)
================================================================ */
function getNotifications(){
  const items = [];
  STATE.platforms.filter(p=>!p.archived).forEach(p=>{
    const d = daysLeft(p.expiryDate);
    const thresholds = (p.alertConfig && p.alertConfig.thresholds) || [];
    if(d < 0){
      items.push({sev:'red', title:`${p.name} está vencido`, sub:`Venció hace ${Math.abs(d)} día(s)`, ts:p.expiryDate, id:p.id});
    } else if(thresholds.some(t => d <= t)){
      items.push({sev:'yellow', title:`${p.name} vence en ${d} día(s)`, sub:`Plan ${p.plan} · ${categoryName(p.category)}`, ts:p.expiryDate, id:p.id});
    }
    if(p.financeStatus==='Solicitado') items.push({sev:'violet', title:`Solicitud enviada a Finanzas`, sub:p.name, ts:p.updatedAt, id:p.id});
    if(p.financeStatus==='En revisión') items.push({sev:'brown', title:`Factura/solicitud en revisión`, sub:p.name, ts:p.updatedAt, id:p.id});
  });
  items.sort((a,b)=> daysLeft(a.ts+'') - daysLeft(b.ts+''));
  return items;
}
function updateNotifBadge(){
  const n = getNotifications().filter(x=>x.sev==='red'||x.sev==='yellow').length;
  const dot = document.getElementById('notifDot');
  const navBadge = document.getElementById('navAlertBadge');
  if(dot) dot.classList.toggle('show', n>0);
  if(navBadge){ navBadge.style.display = n>0 ? 'inline-flex':'none'; navBadge.textContent = n; }
}
function toggleNotifPanel(){
  const panel = document.getElementById('notifPanel');
  const items = getNotifications();
  const colors = {red:'var(--red)', yellow:'var(--yellow)', violet:'var(--violet)', brown:'var(--brown)'};
  panel.innerHTML = `<div style="padding:14px 16px;border-bottom:1px solid var(--border-soft);font-weight:700;font-size:13px;">Centro de notificaciones</div>` +
    (items.length ? items.slice(0,15).map(n => `
      <div class="notif-item">
        <span class="notif-dot" style="background:${colors[n.sev]||'var(--text-faint)'}"></span>
        <div><strong>${escapeHtml(n.title)}</strong><span>${escapeHtml(n.sub)}</span></div>
      </div>`).join('') : `<div class="notif-empty">No hay alertas activas. Todo está bajo control.</div>`);
  panel.classList.toggle('show');
}

/* ================================================================
   MODAL HELPERS
================================================================ */
function openModal(html, size=''){
  const overlay = document.createElement('div');
  overlay.className = 'overlay show';
  overlay.id = 'activeOverlay';
  overlay.innerHTML = `<div class="modal ${size}">${html}</div>`;
  overlay.addEventListener('mousedown', (e)=>{ if(e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
  return overlay;
}
function closeModal(){
  const ov = document.getElementById('activeOverlay');
  if(ov) ov.remove();
}
function confirmDialog(title, message, onConfirm, confirmLabel='Confirmar', danger=true){
  openModal(`
    <div class="modal-head"><h3>${escapeHtml(title)}</h3><button class="icon-btn icon-only" onclick="closeModal()">${ICONS.close}</button></div>
    <div class="modal-body"><p style="color:var(--text-dim);font-size:13.5px;line-height:1.5;">${message}</p></div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn ${danger?'btn-danger':'btn-primary'}" id="confirmActionBtn">${confirmLabel}</button>
    </div>
  `);
  document.getElementById('confirmActionBtn').addEventListener('click', ()=>{ onConfirm(); closeModal(); });
}

function drawDashboardCharts(active){
  if(CHARTS.spend) CHARTS.spend.destroy();
  if(CHARTS.category) CHARTS.category.destroy();
  const months = [];
  const totals = [];
  const baseTotal = active.reduce((s,p)=>s+(p.costMonthly||0),0);
  for(let i=5;i>=0;i--){
    const d = new Date(); d.setMonth(d.getMonth()-i);
    months.push(d.toLocaleDateString('es-CO',{month:'short'}));
    const variance = 1 - (i*0.012) + (Math.sin(i)*0.015);
    totals.push(Math.max(0, Math.round(baseTotal*variance)));
  }
  const ctx1 = document.getElementById('chartSpend');
  CHARTS.spend = new Chart(ctx1, {
    type:'line',
    data:{ labels:months, datasets:[{ data: totals, borderColor:'#3D5FEF', backgroundColor:'rgba(61,95,239,.14)',
      fill:true, tension:.35, pointRadius:0, borderWidth:2.5 }]},
    options:{ plugins:{legend:{display:false}}, scales:{
      x:{grid:{display:false}, ticks:{color:'#6B6B74', font:{size:10.5}}},
      y:{grid:{color:'#202024'}, ticks:{color:'#6B6B74', font:{size:10.5}, callback:v=>'$'+v}}
    }, maintainAspectRatio:false }
  });
  const byCat = {};
  active.forEach(p=>{ const c = categoryName(p.category); byCat[c] = (byCat[c]||0) + (p.costMonthly||0); });
  const catLabels = Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]);
  const catData = catLabels.map(l=>Math.round(byCat[l]));
  const palette = ['#3D5FEF','#B79AEA','#6E93F5','#E89A5C','#E2685C','#E8C158','#C08552','#9C8C84','#8FD16A','#F0A8D8','#5FC9D6'];
  const ctx2 = document.getElementById('chartCategory');
  CHARTS.category = new Chart(ctx2, {
    type:'doughnut',
    data:{ labels:catLabels, datasets:[{ data:catData, backgroundColor:palette, borderWidth:0 }]},
    options:{ plugins:{legend:{position:'bottom', labels:{color:'#A2A2AC', font:{size:10.5}, boxWidth:9, padding:8}}}, cutout:'62%', maintainAspectRatio:false }
  });
}

/* ================================================================
   VIEW: PLATFORMS (CRUD)
================================================================ */
let platformFilters = {q:'', category:'', status:'', area:'', owner:''};

function getFilteredPlatforms(){
  return STATE.platforms.filter(p=>{
    const status = computeStatus(p);
    if(platformFilters.status){ if(status!==platformFilters.status) return false; }
    else { if(p.archived) return false; }
    if(platformFilters.category && p.category!==platformFilters.category) return false;
    if(platformFilters.area && p.area!==platformFilters.area) return false;
    if(platformFilters.owner && p.owner!==platformFilters.owner) return false;
    if(platformFilters.q){
      const q = platformFilters.q.toLowerCase();
      if(!(p.name.toLowerCase().includes(q) || (p.provider||'').toLowerCase().includes(q) || (p.plan||'').toLowerCase().includes(q))) return false;
    }
    return true;
  }).sort((a,b)=> daysLeft(a.expiryDate) - daysLeft(b.expiryDate));
}

  const el = document.getElementById('view-platforms');
  const owners = [...new Set(STATE.platforms.map(p=>p.owner))].filter(Boolean);
  el.innerHTML = `

      <div><h1>Plataformas</h1><p>Inventario completo de suscripciones y licencias digitales.</p></div>

    platformFilters = {q:'', category:'', status:'', area:'', owner:''};

  renderPlatformsTable();

function toggleArchivePlatform(id){
  const p = STATE.platforms.find(x=>x.id===id);
  if(!can('edit')) return toast('No tienes permisos para esta acción','error');
  if(p.archived){
    p.archived = false; p.archiveReason=''; p.archiveDate=null;
    log(`Plataforma: ${p.name}`, 'Restauró', 'Plataforma restaurada desde archivo');
    toast(`${p.name} restaurada`);
    persist(); renderPlatformsTable();
  } else {
    openModal(`
      <div class="modal-head"><h3>Archivar ${escapeHtml(p.name)}</h3><button class="icon-btn icon-only" onclick="closeModal()">${ICONS.close}</button></div>
      <div class="modal-body">
        <div class="form-field full"><label>Motivo del archivo</label><textarea id="archiveReasonInput" placeholder="Ej: Sustituido por otra herramienta, contrato finalizado..."></textarea></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="confirmArchiveBtn">Archivar</button>
      </div>
    `);
    document.getElementById('confirmArchiveBtn').addEventListener('click', ()=>{
      p.archived = true; p.archiveReason = document.getElementById('archiveReasonInput').value.trim(); p.archiveDate = todayISO();
      log(`Plataforma: ${p.name}`, 'Archivó', p.archiveReason || 'Sin motivo especificado');
      toast(`${p.name} archivada`);
      persist(); closeModal(); renderPlatformsTable();
    });
  }
}
function deletePlatform(id){
  if(!can('delete')) return toast('No tienes permisos para esta acción','error');
  const p = STATE.platforms.find(x=>x.id===id);
  confirmDialog('Eliminar plataforma', `¿Seguro que deseas eliminar <strong>${escapeHtml(p.name)}</strong> de forma permanente? Esta acción no se puede deshacer.`, async ()=>{
    for(const d of p.documents){
      if(d.hasContent){ try{ await window.storage.delete('doc-content:'+d.id, false); }catch(e){} }
    }
    STATE.platforms = STATE.platforms.filter(x=>x.id!==id);
    log(`Plataforma: ${p.name}`, 'Eliminó', 'Registro eliminado permanentemente');
    toast(`${p.name} eliminada`);
    persist(); renderCurrentView();
  }, 'Eliminar');
}

      <button class="btn btn-primary" id="savePlatformBtn">${editing?'Guardar cambios':'Crear plataforma'}</button>

  `, 'modal-lg');

  document.getElementById('savePlatformBtn').addEventListener('click', ()=>{
    const name = document.getElementById('pf_name').value.trim();
    const provider = document.getElementById('pf_provider').value.trim();
    const plan = document.getElementById('pf_plan').value.trim();
    const costMonthly = parseFloat(document.getElementById('pf_costMonthly').value || '0');
    const acquiredDate = document.getElementById('pf_acquiredDate').value;
    const expiryDate = document.getElementById('pf_expiryDate').value;
    if(!name || !provider || !plan || !acquiredDate || !expiryDate){
      toast('Completa todos los campos obligatorios (*)', 'error'); return;
    }
    const data = {
      name, provider, plan, costMonthly,
      category: document.getElementById('pf_category').value,
      owner: document.getElementById('pf_owner').value,
      area: document.getElementById('pf_area').value,
      url: document.getElementById('pf_url').value.trim(),
      description: document.getElementById('pf_description').value.trim(),

      paymentMethod: document.getElementById('pf_paymentMethod').value,

      acquiredDate, expiryDate, renewalDate: expiryDate,
      notes: document.getElementById('pf_notes').value.trim(),
      updatedAt: new Date().toISOString(),
    };
    if(editing){
      const prevCost = p.costMonthly;
      Object.assign(p, data);
      if(prevCost !== costMonthly){
        p.costHistory.push({date: todayISO(), oldCost: prevCost, newCost: costMonthly,
          diff: Math.round((costMonthly-prevCost)*100)/100,
          pct: prevCost ? Math.round(((costMonthly-prevCost)/prevCost)*10000)/100 : null});
      }
      log(`Plataforma: ${p.name}`, 'Editó', 'Se actualizaron los datos de la plataforma');
      toast(`${p.name} actualizada`);
    } else {
      const np = {
        id: uid('plat'), financeStatus:'Pendiente', suspended:false, archived:false, archiveReason:'', archiveDate:null,
        alertConfig:{ thresholds:[30,15,7,3,1], channels:{email:true,whatsapp:false,inapp:true,push:false}, emails:[], whatsappNumbers:[],
          autoSendEnabled:true, scheduledType:'alerta', scheduledDate: addDays(data.acquiredDate, 30), scheduledTime:'09:00',
          intervalDays:30, autoSendCompleted:false, lastAutoSendResult:null },
        costHistory:[{date: todayISO(), oldCost:null, newCost: costMonthly, diff:null, pct:null}],
        documents:[], createdAt: new Date().toISOString(),
        ...data,
      };
      STATE.platforms.push(np);
      log(`Plataforma: ${np.name}`, 'Creó', 'Nueva plataforma registrada en el sistema');
      toast(`${np.name} creada`);
    }
    persist(); closeModal(); renderCurrentView();
  });
}

const MAX_DOC_BYTES = 2 * 1024 * 1024; // ~2MB raw file — base64 inflates ~33% plus storage overhead, so we keep a wider safety margin under the ~5MB per-key limit

function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

function openAddDocumentModal(platformId){
  openModal(`
    <div class="modal-head"><h3>Agregar documento</h3><button class="icon-btn icon-only" onclick="closeModal()">${ICONS.close}</button></div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--text-faint);margin-bottom:14px;">El archivo se guarda y queda disponible para descargar después. Tamaño máximo recomendado: 2 MB por archivo (archivos más pesados pueden fallar al guardarse).</p>
      <div class="form-grid">
        <div class="form-field full"><label>Archivo</label><input type="file" id="docFileInput"></div>
        <div class="form-field full"><label>Tipo de documento</label><select id="docKind">${DOC_KINDS.map(k=>`<option>${k}</option>`).join('')}</select></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveDocBtn">Agregar</button>
    </div>
  `);
  document.getElementById('saveDocBtn').addEventListener('click', async ()=>{
    const fileInput = document.getElementById('docFileInput');
    const file = fileInput.files[0];
    const kind = document.getElementById('docKind').value;
    const p = STATE.platforms.find(x=>x.id===platformId);
    const btn = document.getElementById('saveDocBtn');

    if(!file){
      const doc = {id: uid('doc'), name:`documento_${todayISO()}.pdf`, kind, size:'— KB', uploadedAt: todayISO(), hasContent:false, mimeType:''};
      p.documents.push(doc);
      log(`Plataforma: ${p.name}`, 'Agregó documento', `${kind}: ${doc.name} (sin archivo adjunto)`);
      toast('Documento agregado (sin archivo, solo registro)');
      persist(); closeModal(); openPlatformDetail(platformId);
      return;
    }
    const sizeMb = (file.size/1024/1024).toFixed(2);
    if(file.size > MAX_DOC_BYTES){
      toast(`El archivo pesa ${sizeMb} MB. El máximo recomendado es 2 MB — pruébalo comprimido o en partes.`, 'error');
      return;
    }
    btn.disabled = true; btn.textContent = 'Guardando...';
    try{
      const dataUrl = await readFileAsDataURL(file);
      const docId = uid('doc');
      await window.storage.set('doc-content:'+docId, dataUrl, false);
      const sizeKb = Math.max(1, Math.round(file.size/1024)) + ' KB';
      p.documents.push({id: docId, name: file.name, kind, size: sizeKb, uploadedAt: todayISO(), hasContent:true, mimeType: file.type||''});
      log(`Plataforma: ${p.name}`, 'Agregó documento', `${kind}: ${file.name}`);
      toast('Documento agregado y guardado para descarga');
      persist(); closeModal();
      openPlatformDetail(platformId);
    }catch(e){
      console.error('Error guardando contenido del documento:', e);
      // Fall back to a metadata-only record so the upload attempt isn't fully lost
      const sizeKb = Math.max(1, Math.round(file.size/1024)) + ' KB';
      p.documents.push({id: uid('doc'), name: file.name, kind, size: sizeKb, uploadedAt: todayISO(), hasContent:false, mimeType: file.type||''});
      log(`Plataforma: ${p.name}`, 'Agregó documento', `${kind}: ${file.name} (sin contenido — falló el guardado: ${(e&&e.message)||'archivo demasiado pesado para el almacenamiento'})`);
      toast(`No se pudo guardar el contenido del archivo (${sizeMb} MB). Se creó el registro, pero sin descarga disponible.`, 'error');
      persist(); closeModal();
      openPlatformDetail(platformId);
    }
  });
}

async function downloadDocument(docId){
  let found = null;
  for(const p of STATE.platforms){ const d = p.documents.find(x=>x.id===docId); if(d){ found = d; break; } }
  if(!found || !found.hasContent){ toast('Este documento no tiene archivo adjunto (solo es un registro de metadatos)', 'error'); return; }
  try{
    const res = await window.storage.get('doc-content:'+docId, false);
    if(!res || !res.value){ toast('No se encontró el archivo guardado', 'error'); return; }
    const a = document.createElement('a');
    a.href = res.value;
    a.download = found.name;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }catch(e){
    toast('No se pudo recuperar el archivo del almacenamiento', 'error');
  }
}

function removeDocument(platformId, docId){
  if(!can('edit')) return toast('No tienes permisos para esta acción','error');
  const p = STATE.platforms.find(x=>x.id===platformId);
  const d = p.documents.find(x=>x.id===docId);
  if(!d) return;
  confirmDialog('Eliminar documento', `¿Eliminar <strong>${escapeHtml(d.name)}</strong>?`, async ()=>{
    p.documents = p.documents.filter(x=>x.id!==docId);
    if(d.hasContent){ try{ await window.storage.delete('doc-content:'+docId, false); }catch(e){} }
    log(`Plataforma: ${p.name}`, 'Eliminó documento', d.name);
    toast('Documento eliminado');
    persist(); openPlatformDetail(platformId);
  }, 'Eliminar');
}

/* ---------- Renewal request (simulated email + PDF) ---------- */
function openRenewalRequestModal(id){
  const p = STATE.platforms.find(x=>x.id===id);
  const defaultEmails = (p.alertConfig.emails && p.alertConfig.emails.length) ? p.alertConfig.emails.join(', ') : '';
  const configured = emailjsReady();
  openModal(`
    <div class="modal-head"><h3>Solicitar renovación — ${escapeHtml(p.name)}</h3><button class="icon-btn icon-only" onclick="closeModal()">${ICONS.close}</button></div>
    <div class="modal-body">
      ${configured ? `<p style="font-size:12px;color:var(--text-faint);margin-bottom:14px;">Este correo se enviará realmente a través de EmailJS. El resumen financiero va incluido como texto en el cuerpo del mensaje (esta versión no adjunta un PDF binario real).</p>`
        : `<div style="background:var(--orange-dim);color:var(--orange);border-radius:10px;padding:10px 12px;font-size:12.5px;margin-bottom:14px;">EmailJS no está configurado todavía. Ve a <strong>Configuración → Correo</strong> para conectar tu cuenta antes de enviar.</div>`}
      <div class="form-field full" style="margin-bottom:12px;"><label>Para (separa varios correos con coma)</label><input type="text" id="renewalToEmail" value="${escapeHtml(defaultEmails)}" placeholder="finanzas@empresa.com"></div>
      <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:16px;">
        <strong style="font-size:14px;">Solicitud de renovación — ${escapeHtml(p.name)}</strong>
        <p style="font-size:13px;color:var(--text-dim);margin-top:10px;line-height:1.5;">
          Se solicita la aprobación para renovar <strong>${escapeHtml(p.name)}</strong> (${escapeHtml(p.provider)}), plan ${escapeHtml(p.plan)}.
          Costo mensual: ${fmtMoney(p.costMonthly,p.currency)}. Vencimiento actual: ${fmtDate(p.expiryDate)}.
          Solicitado por: ${escapeHtml(STATE.settings.currentUser)}.
        </p>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-violet" id="confirmRenewalBtn">${ICONS.send} Enviar solicitud por correo</button>
    </div>
  `);
  document.getElementById('confirmRenewalBtn').addEventListener('click', async ()=>{
    const toRaw = document.getElementById('renewalToEmail').value.trim();
    if(!toRaw){ toast('Indica al menos un destinatario', 'error'); return; }
    const btn = document.getElementById('confirmRenewalBtn');
    btn.disabled = true; btn.textContent = 'Enviando...';
    const subject = `Solicitud de renovación — ${p.name}`;
    const message = `Se solicita la aprobación para renovar ${p.name} (${p.provider}), plan ${p.plan}.\nCosto mensual: ${fmtMoney(p.costMonthly,p.currency)}.\nVencimiento actual: ${fmtDate(p.expiryDate)}.\nSolicitado por: ${STATE.settings.currentUser}.`;
    const recipients = toRaw.split(',').map(s=>s.trim()).filter(Boolean);
    let okCount = 0, lastError = '';
    for(const addr of recipients){
      const r = await sendRealEmail(addr, subject, message);
      if(r.ok) okCount++; else lastError = r.reason;
    }
    if(okCount>0){
      p.financeStatus = 'Solicitado'; p.updatedAt = new Date().toISOString();
      p.alertConfig.emails = recipients;
      log(`Plataforma: ${p.name}`, 'Solicitó renovación', `Correo real enviado a ${okCount}/${recipients.length} destinatario(s) vía EmailJS`);
      toast(okCount===recipients.length ? `Correo enviado a ${okCount} destinatario(s)` : `Enviado a ${okCount}/${recipients.length} (revisa los demás)`);
      persist(); closeModal(); renderCurrentView();
    } else {
      toast('No se pudo enviar: ' + (lastError || 'revisa tu configuración de EmailJS'), 'error');
      btn.disabled = false; btn.textContent = '↻ Reintentar envío';
    }
  });
}

function setFinanceStatus(id, newStatus){
  if(!can('approve')) return toast('No tienes permisos para aprobar cambios financieros','error');
  const p = STATE.platforms.find(x=>x.id===id);
  const old = p.financeStatus;
  if(newStatus==='Renovado'){
    const newExpiry = addDays(todayISO(), 365);
    p.expiryDate = newExpiry; p.renewalDate = newExpiry; p.financeStatus = 'Pendiente';
    p.updatedAt = new Date().toISOString();
    log(`Plataforma: ${p.name}`, 'Renovó plataforma', `Ciclo renovado. Nuevo vencimiento: ${fmtDate(newExpiry)}`);
    toast(`${p.name} renovada — nuevo vencimiento ${fmtDate(newExpiry)}`);
  } else {
    p.financeStatus = newStatus; p.updatedAt = new Date().toISOString();
    log(`Plataforma: ${p.name}`, 'Cambió estado financiero', `${old} → ${newStatus}`);
    toast(`Estado actualizado: ${newStatus}`);
  }
  persist(); renderFinance();
}

async function sendPendingAlertEmails(){
  if(!can('edit')) return toast('No tienes permisos para esta acción','error');
  if(!emailjsReady()){ toast('Configura EmailJS en Configuración > Correo primero', 'error'); return; }
  const targets = STATE.platforms.filter(p=>{
    if(p.archived) return false;
    if(!p.alertConfig.channels.email || !p.alertConfig.emails.length) return false;
    const d = daysLeft(p.expiryDate);
    return d < 0 || p.alertConfig.thresholds.some(t=>d<=t);
  });
  if(!targets.length){ toast('No hay alertas con destinatarios de email configurados'); return; }
  const btn = document.getElementById('btnSendAlertEmails');
  btn.disabled = true; btn.textContent = 'Enviando...';
  let sentPlatforms = 0, sentEmails = 0, failed = 0;
  for(const p of targets){
    const d = daysLeft(p.expiryDate);
    const subject = d < 0 ? `Alerta: ${p.name} está vencido` : `Alerta: ${p.name} vence en ${d} día(s)`;
    const message = d < 0
      ? `${p.name} (${p.provider}) venció hace ${Math.abs(d)} día(s). Plan ${p.plan}. Costo mensual: ${fmtMoney(p.costMonthly,p.currency)}. Revisa su renovación en Subscription Control Center.`
      : `${p.name} (${p.provider}) vence en ${d} día(s) (${fmtDate(p.expiryDate)}). Plan ${p.plan}. Costo mensual: ${fmtMoney(p.costMonthly,p.currency)}.`;
    let anyOk = false;
    for(const addr of p.alertConfig.emails){
      const r = await sendRealEmail(addr, subject, message);
      if(r.ok){ sentEmails++; anyOk = true; } else { failed++; }
    }
    if(anyOk){ sentPlatforms++; log(`Plataforma: ${p.name}`, 'Envió alerta', `Correo real de alerta enviado a ${p.alertConfig.emails.join(', ')}`); }
  }
  persist();
  btn.disabled = false; btn.textContent = ICONS.mail + ' Enviar alertas por correo ahora';
  renderAlerts();
  toast(failed===0 ? `${sentEmails} correo(s) enviados (${sentPlatforms} plataforma(s))` : `${sentEmails} enviados, ${failed} fallidos — revisa tu configuración de EmailJS`, failed>0 && sentEmails===0 ? 'error' : 'success');
}

/* ---------- Automatic scheduled sends ----------
   Checked on load and every 60s while the app/tab is open. There is no
   server, so a scheduled send can only fire if someone has this app
   open at or after the scheduled date/time — it cannot wake up a closed
   browser. Once fired, autoSendCompleted is set so it won't repeat;
   editing the schedule date/time re-arms it. */
async function checkScheduledSends(){
  if(!STATE || !emailjsReady()) return;
  let firedAny = false;
  for(const p of STATE.platforms){
    const ac = p.alertConfig;
    if(p.archived || !ac || !ac.autoSendEnabled || ac.autoSendCompleted) continue;
    if(!ac.scheduledDate || !ac.scheduledTime) continue;
    const due = new Date(`${ac.scheduledDate}T${ac.scheduledTime}:00`);
    if(isNaN(due.getTime()) || new Date() < due) continue;

    if(!ac.emails || !ac.emails.length){
      ac.autoSendCompleted = true; ac.lastAutoSendResult = 'Sin destinatarios configurados';
      log(`Plataforma: ${p.name}`, 'Envío automático omitido', 'No hay destinatarios de email configurados');
      firedAny = true; continue;
    }
    const isSolicitud = ac.scheduledType === 'solicitud';
    const subject = isSolicitud ? `Solicitud de renovación — ${p.name}` : `Alerta de renovación — ${p.name}`;
    const message = isSolicitud
      ? `Se solicita la aprobación para renovar ${p.name} (${p.provider}), plan ${p.plan}.\nCosto mensual: ${fmtMoney(p.costMonthly,p.currency)}.\nVencimiento actual: ${fmtDate(p.expiryDate)}.\nEnvío automático programado.`
      : `${p.name} (${p.provider}) — recordatorio automático de renovación. Plan ${p.plan}. Costo mensual: ${fmtMoney(p.costMonthly,p.currency)}. Vencimiento: ${fmtDate(p.expiryDate)}.`;
    let okCount = 0;
    for(const addr of ac.emails){
      const r = await sendRealEmail(addr, subject, message);
      if(r.ok) okCount++;
    }
    ac.autoSendCompleted = true;
    ac.lastAutoSendResult = okCount>0 ? `Enviado a ${okCount}/${ac.emails.length} el ${fmtDate(todayISO())}` : 'Falló el envío automático';
    if(okCount>0){
      if(isSolicitud) p.financeStatus = 'Solicitado';
      const interval = parseInt(ac.intervalDays) || 30;
      const nextDate = addDays(ac.scheduledDate, interval);
      log(`Plataforma: ${p.name}`, 'Envío automático ejecutado', `${isSolicitud?'Solicitud de renovación':'Alerta'} enviada a ${okCount}/${ac.emails.length} destinatario(s). Reprogramado para ${fmtDate(nextDate)} a las ${ac.scheduledTime}`);
      ac.scheduledDate = nextDate;
      ac.autoSendCompleted = false; // re-armed for the next cycle
      ac.lastAutoSendResult += ` — próximo envío: ${fmtDate(nextDate)}`;
    } else {
      ac.autoSendCompleted = true;
      log(`Plataforma: ${p.name}`, 'Envío automático falló', 'No se pudo enviar ningún correo programado');
    }
    firedAny = true;
  }
  if(firedAny){ persist(); if(STATE.ui && STATE.ui.activeView) renderCurrentView(); }
}

    : ac.autoSendCompleted ? `Ejecutado — ${ac.lastAutoSendResult || 'ver auditoría'}`

  const overlay = openModal(`
    <div class="modal-head"><h3>Configurar alertas — ${escapeHtml(p.name)}</h3><button class="icon-btn icon-only" onclick="closeModal()">${ICONS.close}</button></div>
    <div class="modal-body">

          <label class="chip-check ${ac.autoSendEnabled?'checked':''}" style="margin:0;"><input type="checkbox" id="autoSendEnabled" ${ac.autoSendEnabled?'checked':''}> Activar envío automático</label>
          <span class="text-faint" style="font-size:11px;">${escapeHtml(statusText)}</span>
        </div>
        <div class="form-grid">
          <div class="form-field"><label>Tipo de correo a enviar</label>
            <select id="scheduledType">
              <option value="alerta" ${ac.scheduledType==='alerta'?'selected':''}>Alerta de vencimiento</option>
              <option value="solicitud" ${ac.scheduledType==='solicitud'?'selected':''}>Solicitud de renovación</option>
            </select>
          </div>
          <div class="form-field"><label>Repetir cada (días)</label><input type="number" min="1" id="intervalDays" value="${ac.intervalDays}"></div>
          <div class="form-field"><label>Fecha de envío</label><input type="date" id="scheduledDate" value="${ac.scheduledDate}"></div>
          <div class="form-field"><label>Hora de envío</label><input type="time" id="scheduledTime" value="${ac.scheduledTime}"></div>
        </div>
        <p style="font-size:11px;color:var(--text-faint);margin-top:10px;line-height:1.5;">Por defecto, un mes después de la adquisición. Cada vez que se envía con éxito, se reprograma sola para la siguiente fecha (fecha + días de repetición, misma hora) — puedes cambiar la fecha, la hora o el intervalo cuando quieras. Solo se envía mientras la app esté abierta en o después de ese momento.</p>
      </div>
      <div class="form-field full"><label>Umbrales de anticipación (días antes del vencimiento)</label>
        <div class="checkbox-row">
          ${ALL_THRESHOLDS.map(t=>`<label class="chip-check ${p.alertConfig.thresholds.includes(t)?'checked':''}"><input type="checkbox" value="${t}" class="threshChk" ${p.alertConfig.thresholds.includes(t)?'checked':''}> ${t} días</label>`).join('')}
        </div>
      </div>
      <div class="form-field full" style="margin-top:14px;"><label>Canales de notificación</label>
        <div class="checkbox-row">
          ${[['email','Email'],['whatsapp','WhatsApp'],['inapp','In-app'],['push','Push']].map(([k,l])=>`
            <label class="chip-check ${p.alertConfig.channels[k]?'checked':''}"><input type="checkbox" value="${k}" class="chanChk" ${p.alertConfig.channels[k]?'checked':''}> ${l}</label>`).join('')}
        </div>
      </div>
      <div class="form-grid" style="margin-top:14px;">
        <div class="form-field full"><label>Destinatarios de email (uno por línea)</label><textarea id="alertEmails">${(p.alertConfig.emails||[]).join('\n')}</textarea></div>
        <div class="form-field full"><label>Números de WhatsApp (uno por línea)</label><textarea id="alertWhats">${(p.alertConfig.whatsappNumbers||[]).join('\n')}</textarea></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveAlertBtn">Guardar configuración</button>
    </div>
  `);
  overlay.querySelectorAll('.chip-check').forEach(chip=>{
    const input = chip.querySelector('input');
    if(input) input.addEventListener('change', e=>chip.classList.toggle('checked', e.target.checked));
  });
  overlay.querySelector('#saveAlertBtn').addEventListener('click', ()=>{
    const thresholds = [...overlay.querySelectorAll('.threshChk:checked')].map(c=>parseInt(c.value));
    const channels = {email:false,whatsapp:false,inapp:false,push:false};
    overlay.querySelectorAll('.chanChk:checked').forEach(c=>channels[c.value]=true);
    p.alertConfig.thresholds = thresholds;
    p.alertConfig.channels = channels;
    p.alertConfig.emails = overlay.querySelector('#alertEmails').value.split('\n').map(s=>s.trim()).filter(Boolean);
    p.alertConfig.whatsappNumbers = overlay.querySelector('#alertWhats').value.split('\n').map(s=>s.trim()).filter(Boolean);

    const newDate = overlay.querySelector('#scheduledDate').value || ac.scheduledDate;
    const newTime = overlay.querySelector('#scheduledTime').value || ac.scheduledTime;
    const newInterval = parseInt(overlay.querySelector('#intervalDays').value) || 30;
    const scheduleChanged = (newDate !== ac.scheduledDate) || (newTime !== ac.scheduledTime) || (newInterval !== ac.intervalDays);
    p.alertConfig.scheduledType = overlay.querySelector('#scheduledType').value;
    p.alertConfig.scheduledDate = newDate;
    p.alertConfig.scheduledTime = newTime;
    p.alertConfig.intervalDays = newInterval;
    p.alertConfig.autoSendEnabled = overlay.querySelector('#autoSendEnabled').checked;
    if(scheduleChanged){ p.alertConfig.autoSendCompleted = false; p.alertConfig.lastAutoSendResult = null; }

    log(`Plataforma: ${p.name}`, 'Editó', 'Configuración de alertas actualizada');
    toast('Configuración de alertas guardada');
    persist(); closeModal(); renderAlerts();
  });
}

function generateReport(){
  // Base set: 'general' and 'personalizado' start from EVERY subscription (including archived),
  // since the point is to see all of them unless a filter narrows it down.
  // The operational report types start from active subscriptions only, by design.
  let list = (reportType==='renovaciones' || reportType==='finanzas' || reportType==='vencimientos')
    ? STATE.platforms.filter(p=>!p.archived)
    : STATE.platforms.slice();
  let title = 'Reporte General de Plataformas';
  if(reportType==='renovaciones'){ title='Reporte de Renovaciones'; list = list.filter(p=>daysLeft(p.expiryDate)<=90 && daysLeft(p.expiryDate)>=0); }
  else if(reportType==='finanzas'){ title='Reporte Financiero'; }
  else if(reportType==='vencimientos'){ title='Reporte de Vencimientos'; list = list.filter(p=>daysLeft(p.expiryDate)<=30); }
  else if(reportType==='personalizado'){
    title='Reporte Personalizado';
    const cat = document.getElementById('rfCategory').value, area = document.getElementById('rfArea').value, status = document.getElementById('rfStatus').value;
    if(cat) list = list.filter(p=>p.category===cat);
    if(area) list = list.filter(p=>p.area===area);
    if(status) list = list.filter(p=>computeStatus(p)===status);
  }
  if(reportDateFrom) list = list.filter(p=>p.expiryDate >= reportDateFrom);
  if(reportDateTo) list = list.filter(p=>p.expiryDate <= reportDateTo);
  list.sort((a,b)=> a.expiryDate < b.expiryDate ? -1 : 1);

  const total = list.reduce((s,p)=>s+(p.costMonthly||0),0);
  const vencidas = list.filter(p=>computeStatus(p)==='vencido').length;
  const proximas = list.filter(p=>computeStatus(p)==='proximo').length;
  const rangeLabel = (reportDateFrom||reportDateTo) ? `Vencimiento: ${reportDateFrom?fmtDate(reportDateFrom):'inicio'} – ${reportDateTo?fmtDate(reportDateTo):'fin'}` : '';

  document.getElementById('reportPreviewArea').innerHTML = `
    <div id="printArea">
      <div class="report-page">
        <div class="report-head">
          <div style="display:flex;gap:10px;align-items:center;"><div class="markblock"></div><div><h2 style="font-size:18px;">${title}</h2><div style="font-size:11px;color:#666;">Subscription Control Center${rangeLabel?' · '+rangeLabel:''}</div></div></div>
          <div style="text-align:right;font-size:11px;color:#666;">Generado: ${fmtDate(todayISO())}<br>Por: ${escapeHtml(STATE.settings.currentUser)}</div>
        </div>
        <div class="report-kpis">
          <div class="report-kpi"><span>Plataformas incluidas</span><strong>${list.length}</strong></div>
          <div class="report-kpi"><span>Gasto mensual total</span><strong>${fmtMoney(total)}</strong></div>
          <div class="report-kpi"><span>Próximas a vencer</span><strong>${proximas}</strong></div>
          <div class="report-kpi"><span>Vencidas</span><strong>${vencidas}</strong></div>
        </div>
        <table class="report-table">
          <thead><tr><th>Plataforma</th><th>Categoría</th><th>Responsable</th><th>Costo mensual</th><th>Vence</th><th>Estado</th></tr></thead>
          <tbody>
            ${list.map(p=>`<tr><td>${escapeHtml(p.name)}</td><td>${categoryName(p.category)}</td><td>${escapeHtml(p.owner||'')}</td><td>${fmtMoney(p.costMonthly,p.currency)}</td><td>${fmtDate(p.expiryDate)}</td><td>${STATUS_META[computeStatus(p)].label}</td></tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:#999;">Sin resultados para los filtros seleccionados</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:14px;">
      <button class="btn btn-primary" onclick="window.print()">${ICONS.download} Imprimir / Guardar como PDF</button>
    </div>
  `;
  document.getElementById('reportPreviewArea').scrollIntoView({behavior:'smooth', block:'start'});
}

    <thead><tr><th>Fecha y hora</th><th>Usuario</th><th>Acción</th><th>Entidad</th><th>Detalle</th><th>Origen</th></tr></thead>
    <tbody>${list.map(a=>`<tr>
      <td class="text-faint" style="white-space:nowrap;">${new Date(a.timestamp).toLocaleString('es-CO')}</td>
      <td class="text-dim">${escapeHtml(a.user)}</td>
      <td><span class="audit-action">${escapeHtml(a.action)}</span></td>
      <td class="text-dim">${escapeHtml(a.entity)}</td>
      <td class="text-dim">${escapeHtml(a.details)}</td>
      <td class="text-faint">${escapeHtml(a.ip)}</td>
    </tr>`).join('')}</tbody>
  </table>` : `<div class="empty-state">${ICONS.audit}<strong>Sin registros</strong></div>`;
}

/* ================================================================
   VIEW: SETTINGS
================================================================ */
function renderSettings(){
  const el = document.getElementById('view-settings');
  el.innerHTML = `
    <div class="view-header"><div><h1>Configuración</h1><p>Usuarios, categorías y acerca de la plataforma.</p></div></div>

    <div class="panel" style="margin-bottom:18px;">
      <div class="panel-title"><h3>Usuarios</h3><button class="btn btn-primary btn-sm" id="btnInviteUser" ${can('manageUsers')?'':'disabled title="Solo Super Admin puede gestionar usuarios"'}>${ICONS.plus} Invitar usuario</button></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th></th></tr></thead>
        <tbody>
          ${STATE.users.map(u=>`<tr>
            <td><div style="display:flex;align-items:center;gap:8px;"><div class="avatar" style="width:24px;height:24px;font-size:10px;">${initials(u.name)}</div><strong style="font-size:13px;">${escapeHtml(u.name)}</strong></div></td>
            <td class="text-dim">${escapeHtml(u.email)}</td>
            <td><select ${can('manageUsers')?'':'disabled'} onchange="changeUserRole('${u.id}', this.value)">
              ${['super_admin','admin','viewer'].map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${roleLabel(r)}</option>`).join('')}
            </select></td>
            <td><span class="badge ${u.status==='Activo'?'badge-activo':u.status==='Suspendido'?'badge-suspendido':'badge-pendiente'}">${u.status}</span></td>
            <td><button class="icon-btn icon-only" title="Eliminar usuario" ${can('manageUsers')?'':'disabled'} onclick="removeUser('${u.id}')">${ICONS.trash}</button></td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>

    <div class="panel" style="margin-bottom:18px;">
      <div class="panel-title"><h3>Categorías</h3></div>
      <div class="checkbox-row" style="margin-bottom:14px;">
        ${STATE.categories.map(c=>`<span class="chip-check checked">${escapeHtml(c.name)} ${can('manageCategories')?`<span style="cursor:pointer;margin-left:4px;" onclick="removeCategory('${c.id}')">${ICONS.close}</span>`:''}</span>`).join('')}
      </div>
      ${can('manageCategories') ? `
      <div style="display:flex;gap:8px;max-width:340px;">
        <input type="text" id="newCategoryInput" placeholder="Nueva categoría...">
        <button class="btn btn-secondary btn-sm" id="addCategoryBtn">${ICONS.plus} Agregar</button>
      </div>` : ''}
    </div>

    <div class="panel" style="margin-bottom:18px;">
      <div class="panel-title"><h3>Correo (EmailJS) — envío real</h3>${emailjsReady() ? '<span class="badge badge-activo">Conectado</span>' : '<span class="badge badge-pendiente">Sin configurar</span>'}</div>
      <p style="font-size:12px;color:var(--text-faint);line-height:1.6;margin-bottom:14px;">
        1) Crea una cuenta gratuita en EmailJS y conecta tu Gmail/Outlook como "Email Service".
        2) Crea un "Email Template" con las variables <code>{{to_email}}</code>, <code>{{subject}}</code> y <code>{{message}}</code> (usa <code>{{subject}}</code> como asunto y <code>{{message}}</code> como cuerpo).
        3) Copia aquí el Service ID, Template ID y Public Key desde tu panel de EmailJS.
      </p>
      <div class="form-grid">
        <div class="form-field"><label>Service ID</label><input id="ej_service" value="${escapeHtml(STATE.settings.emailjs.serviceId)}" placeholder="service_xxxxxxx"></div>
        <div class="form-field"><label>Template ID</label><input id="ej_template" value="${escapeHtml(STATE.settings.emailjs.templateId)}" placeholder="template_xxxxxxx"></div>
        <div class="form-field full"><label>Public Key</label><input id="ej_key" value="${escapeHtml(STATE.settings.emailjs.publicKey)}" placeholder="public key de tu cuenta EmailJS"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:14px;">
        <button class="btn btn-secondary btn-sm" id="btnSaveEmailjs">Guardar configuración</button>
      </div>
      <div style="border-top:1px solid var(--border-soft);margin-top:16px;padding-top:14px;display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
        <div class="form-field" style="flex:1;min-width:220px;"><label>Enviar correo de prueba a</label><input id="ej_testEmail" type="email" placeholder="tu@empresa.com"></div>
        <button class="btn btn-violet btn-sm" id="btnTestEmailjs">${ICONS.send} Enviar prueba</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title"><h3>Acerca de esta plataforma</h3></div>
      <p style="font-size:13px;color:var(--text-dim);line-height:1.6;">
        Subscription Control Center es una aplicación 100% HTML, CSS y JavaScript que corre en el navegador. El inventario de plataformas,
        categorías, flujo financiero, alertas, documentos (con descarga real, hasta 3.5 MB por archivo) y auditoría son completamente funcionales y persisten entre sesiones.
        El envío de correo (solicitudes de renovación y alertas) es <strong>real</strong> una vez configuras EmailJS arriba, y puede enviarse manualmente o de forma <strong>programada</strong> (fecha y hora configurables por plataforma en Alertas).
        El envío programado solo se ejecuta mientras alguien tenga la app abierta en o después de ese momento — sin un servidor no es posible despertar un navegador cerrado para enviar a una hora exacta.
        Lo siguiente sigue <strong>simulado</strong> en esta versión, porque requiere un backend con credenciales secretas:
      </p>
      <ul style="font-size:13px;color:var(--text-dim);line-height:1.7;padding-left:18px;margin-top:10px;">
        <li>Envío de mensajes de WhatsApp (proveedores como Twilio no aceptan llamadas directas desde el navegador; se muestra una vista previa del contenido).</li>
        <li>Autenticación de usuarios con contraseña y 2FA (el cambio de rol aquí es solo una demostración de RBAC).</li>
      </ul>
    </div>
  `;
  document.getElementById('btnInviteUser').addEventListener('click', openInviteUserModal);
  const addCatBtn = document.getElementById('addCategoryBtn');
  if(addCatBtn) addCatBtn.addEventListener('click', ()=>{
    const val = document.getElementById('newCategoryInput').value.trim();
    if(!val) return;
    STATE.categories.push({id: uid('cat'), name: val});
    log('Categorías', 'Creó', `Nueva categoría: ${val}`);
    toast('Categoría agregada');
    persist(); renderSettings();
  });
  document.getElementById('btnSaveEmailjs').addEventListener('click', ()=>{
    STATE.settings.emailjs = {
      serviceId: document.getElementById('ej_service').value.trim(),
      templateId: document.getElementById('ej_template').value.trim(),
      publicKey: document.getElementById('ej_key').value.trim(),
    };
    log('Configuración', 'Editó', 'Credenciales de EmailJS actualizadas');
    toast('Configuración de correo guardada');
    persist(); renderSettings();
  });
  document.getElementById('btnTestEmailjs').addEventListener('click', async ()=>{
    const addr = document.getElementById('ej_testEmail').value.trim();
    if(!addr){ toast('Indica un correo de prueba', 'error'); return; }
    const btn = document.getElementById('btnTestEmailjs');
    btn.disabled = true; btn.textContent = 'Enviando...';
    const r = await sendRealEmail(addr, 'Prueba — Subscription Control Center', 'Si recibiste este correo, tu configuración de EmailJS funciona correctamente.');
    btn.disabled = false; btn.textContent = ICONS.send + ' Enviar prueba';
    if(r.ok) toast('Correo de prueba enviado. Revisa tu bandeja de entrada.');
    else toast('Falló el envío: ' + r.reason, 'error');
  });
}
function changeUserRole(userId, role){
  if(!can('manageUsers')) return toast('No tienes permisos para esta acción','error');
  const u = STATE.users.find(x=>x.id===userId);
  u.role = role;
  log('Usuarios', 'Cambió rol', `${u.name} → ${roleLabel(role)}`);
  toast(`Rol de ${u.name} actualizado`);
  persist(); renderSettings();
}
function removeUser(userId){
  if(!can('manageUsers')) return toast('No tienes permisos para esta acción','error');
  const u = STATE.users.find(x=>x.id===userId);
  confirmDialog('Eliminar usuario', `¿Eliminar a <strong>${escapeHtml(u.name)}</strong> del sistema?`, ()=>{
    STATE.users = STATE.users.filter(x=>x.id!==userId);
    log('Usuarios', 'Eliminó', `Usuario eliminado: ${u.name}`);
    toast('Usuario eliminado');
    persist(); renderSettings();
  }, 'Eliminar');
}
function removeCategory(catId){
  if(!can('manageCategories')) return toast('No tienes permisos para esta acción','error');
  const inUse = STATE.platforms.some(p=>p.category===catId);
  if(inUse){ toast('No se puede eliminar: hay plataformas usando esta categoría','error'); return; }
  const c = STATE.categories.find(x=>x.id===catId);
  STATE.categories = STATE.categories.filter(x=>x.id!==catId);
  log('Categorías', 'Eliminó', `Categoría eliminada: ${c.name}`);
  toast('Categoría eliminada');
  persist(); renderSettings();
}
function openInviteUserModal(){
  openModal(`
    <div class="modal-head"><h3>Invitar usuario</h3><button class="icon-btn icon-only" onclick="closeModal()">${ICONS.close}</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-field full"><label>Nombre completo</label><input id="inv_name" placeholder="Ej: María Torres"></div>
        <div class="form-field full"><label>Email corporativo</label><input id="inv_email" type="email" placeholder="maria.torres@empresa.com"></div>
        <div class="form-field full"><label>Rol</label><select id="inv_role">${['admin','viewer'].map(r=>`<option value="${r}">${roleLabel(r)}</option>`).join('')}</select></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="sendInviteBtn">${ICONS.send} Enviar invitación (simulada)</button>
    </div>
  `);
  document.getElementById('sendInviteBtn').addEventListener('click', ()=>{
    const name = document.getElementById('inv_name').value.trim();
    const email = document.getElementById('inv_email').value.trim();
    if(!name || !email){ toast('Completa nombre y email', 'error'); return; }
    STATE.users.push({id: uid('usr'), name, email, role: document.getElementById('inv_role').value, status:'Invitado'});
    log('Usuarios', 'Invitó usuario', `${name} (${email})`);
    toast(`Invitación enviada a ${name} (simulada)`);
    persist(); closeModal(); renderSettings();
  });
}

/* ================================================================
   BOOTSTRAP
================================================================ */
(async function init(){
  await loadState();
  buildShell();
  switchView('dashboard');
  checkScheduledSends();
  setInterval(checkScheduledSends, 60000);
})();
</script>
</body>
</html>
